name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build PHP image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/php/Dockerfile
          target: dev
          push: false
          tags: pizzalumina-php:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            HOST_UID=1000
            HOST_GID=1000

  code-quality:
    name: Code Quality (CS, PHPStan, Rector, Tests)
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: pizzalumina_test
          POSTGRES_USER: laravel
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U laravel -d pizzalumina_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      APP_ENV: testing
      APP_URL: http://localhost
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: pizzalumina_test
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      REDIS_PASSWORD: null
      CACHE_STORE: redis
      SESSION_DRIVER: array

    defaults:
      run:
        working-directory: src

    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: bcmath, ctype, fileinfo, json, mbstring, pdo, pdo_pgsql, tokenizer, xml, pcntl
          coverage: none
          tools: composer:v2

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('src/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate --force
          php artisan jwt:secret --force

      - name: Run migrations (fresh)
        run: php artisan migrate:fresh --force

      - name: PHP CS Fixer
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --verbose

      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress --error-format=github

      - name: Rector
        run: vendor/bin/rector process --dry-run

      - name: Tests
        run: php artisan test
