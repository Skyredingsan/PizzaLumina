  name: CI

  on:
    push:
      branches: [main, master, develop]
    pull_request:
      branches: [main, master, develop]

  jobs:
    build:
      name: Build Docker image
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Build PHP image
          uses: docker/build-push-action@v6
          with:
            context: .
            file: ./docker/php/Dockerfile
            target: dev
            push: false
            tags: pizzalumina-php:ci-${{ github.sha }}
            cache-from: type=gha
            cache-to: type=gha,mode=max
            build-args: |
              HOST_UID=1000
              HOST_GID=1000

    code-quality:
      name: Code Quality (Pint, PHPStan, Rector, Tests)
      runs-on: ubuntu-latest
      needs: build

      services:
        postgres:
          image: postgres:17-alpine
          env:
            POSTGRES_DB: pizzalumina_test
            POSTGRES_USER: laravel
            POSTGRES_PASSWORD: secret
          ports:
            - 5432:5432
          options: >-
            --health-cmd "pg_isready -U laravel -d pizzalumina_test"
            --health-interval 5s
            --health-timeout 5s
            --health-retries 5

        redis:
          image: redis:7.4-alpine
          ports:
            - 6379:6379
          options: >-
            --health-cmd "redis-cli ping"
            --health-interval 5s
            --health-timeout 3s
            --health-retries 5

      env:
        APP_ENV: testing
        APP_KEY: base64:Z3JlZyBoZXJlIGEgYmFzZTY0IGtleQ==
        DB_CONNECTION: pgsql
        DB_HOST: 127.0.0.1
        DB_PORT: 5432
        DB_DATABASE: pizzalumina_test
        DB_USERNAME: laravel
        DB_PASSWORD: secret
        JWT_SECRET: test-secret-for-ci-only
        REDIS_HOST: 127.0.0.1

      defaults:
        run:
          working-directory: src

      steps:
        - uses: actions/checkout@v4

        - name: Setup PHP
          uses: shivammathur/setup-php@v2
          with:
            php-version: '8.3'
            extensions: bcmath, ctype, fileinfo, json, mbstring, pdo, pdo_pgsql, tokenizer, xml, pcntl
            coverage: none
            tools: composer:v2

        - name: Get composer cache directory
          id: composer-cache
          run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

        - name: Cache dependencies
          uses: actions/cache@v4
          with:
            path: ${{ steps.composer-cache.outputs.dir }}
            key: ${{ runner.os }}-composer-${{ hashFiles('src/composer.lock') }}
            restore-keys: ${{ runner.os }}-composer-

        - name: Install dependencies
          run: composer install --no-interaction --prefer-dist

        - name: Prepare environment
          run: |
            cp .env.example .env
            php artisan config:clear

        - name: Run migrations
          run: php artisan migrate --force

        - name: Laravel Pint (CS check)
          run: vendor/bin/pint --test

        - name: PHPStan
          run: vendor/bin/phpstan analyse --no-progress --error-format=github

        - name: Rector
          run: vendor/bin/rector process --dry-run

        - name: Tests
          run: php artisan test