
services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: dev
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    container_name: pizzalumina-php
    volumes:
      - ./src:/var/www/app
      - ~/.composer:/tmp/composer:rw
    environment:
      - PHP_IDE_CONFIG=serverName=PizzaLumina
      - APP_ENV=local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    networks:
      - pizzalumina

  nginx:
    image: nginx:1.27-alpine
    container_name: pizzalumina-nginx
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./src:/var/www/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - pizzalumina

  postgres:
    image: postgres:17-alpine
    container_name: pizzalumina-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pizzalumina}
      POSTGRES_USER: ${POSTGRES_USER:-laravel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-laravel} -d ${POSTGRES_DB:-pizzalumina}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pizzalumina

  redis:
    image: redis:7.4-alpine
    container_name: pizzalumina-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - pizzalumina

  rabbitmq:
    image: rabbitmq:4.0-management-alpine
    container_name: pizzalumina-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pizzalumina

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  pizzalumina:
    driver: bridge
